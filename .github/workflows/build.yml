name: Build VideoEdit Pro APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Code Files
        run: |
          rm -rf app build.gradle build.gradle.kts settings.gradle settings.gradle.kts gradlew gradle
          mkdir -p app/src/main/java/com/videoeditpro/app
          mkdir -p app/src/main/res/values
          
          echo "include ':app'" > settings.gradle

          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.0.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          android {
              namespace 'com.videoeditpro.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.videoeditpro.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.gms:play-services-ads:23.0.0'
          }
          EOF

          echo '<resources></resources>' > app/src/main/res/values/themes.xml

          cat << 'EOF' > app/src/main/java/com/videoeditpro/app/MainActivity.kt
          package com.videoeditpro.app
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import com.google.android.gms.ads.MobileAds
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  MobileAds.initialize(this) {}
                  setContentView(android.R.layout.activity_list_item)
              }
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.videoeditpro.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="VideoEdit Pro" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-8995513369904529~8169198851"/>
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          gradle wrapper --gradle-version 8.0.2

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoEditPro-APK
          path: app/build/outputs/apk/debug/app-debug.apk
